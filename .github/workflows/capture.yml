name: TWSE Capture Job

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

jobs:
  run-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml tqdm openpyxl

      - name: Run TWSE capture
        run: |
          python twse_stock_capture.py --batch ${{ matrix.batch }} --batch-size 400 --workers 8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twse-capture-batch-${{ matrix.batch }}
          path: |
            stockList/
            stockIndex/
            summary_batch_${{ matrix.batch }}.txt
          if-no-files-found: warn
