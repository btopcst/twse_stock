name: TWSE Capture Job

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

jobs:
  run-twse-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml tqdm openpyxl pandas-ta matplotlib numpy

      - name: Run TWSE capture
        run: |
          python twse_stock_capture.py --batch ${{ matrix.batch }} --batch-size 400 --workers 8

      - name: Upload TWSE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twse-capture-batch-${{ matrix.batch }}
          path: |
            stockList/
            stockIndex/
            summary_batch_${{ matrix.batch }}.txt
          if-no-files-found: warn

  run-tpex-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml tqdm openpyxl pandas-ta matplotlib numpy

      - name: Run TPEx capture
        run: |
          python tpex_stock_capture.py --batch ${{ matrix.batch }} --batch-size 250

      - name: Upload TPEx artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpex-capture-batch-${{ matrix.batch }}
          path: |
            stockList/
          if-no-files-found: warn

  merge-and-handle:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs:
      - run-twse-capture
      - run-tpex-capture

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml tqdm openpyxl pandas-ta matplotlib numpy

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Merge stockList files
        run: |
          mkdir -p stockList
          # Copy xlsx files from nested stockList folders
          find downloaded_artifacts -type f -name "*.xlsx" -path "*/stockList/*" -exec cp {} stockList/ \;
          # Also copy xlsx files directly under artifact root, if any
          find downloaded_artifacts -type f -name "*.xlsx" ! -path "*/stockList/*" -exec cp {} stockList/ \;

          echo "Merged stock files:"
          ls stockList | wc -l

      - name: Run stock handle
        run: |
          python twse_stock_handle.py

      - name: Send Telegram report
        run: |
          python send_telegram_report.py
        continue-on-error: true

      - name: Upload handle result artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handle-results
          path: |
            summary.xlsx
            stockData/
            bad_files.txt
          if-no-files-found: warn
