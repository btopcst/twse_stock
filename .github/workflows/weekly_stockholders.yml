name: Weekly Stockholders Job

on:
  schedule:
    - cron: "0 7 * * 0"   # вҖ“з§…гӮү 07:00 UTC = оҷҫиҠ– 15:00
  workflow_dispatch:

jobs:
  run-weekly-job:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests tqdm openpyxl lxml beautifulsoup4

      #Step 1о“ҚСҠоҖ°зӢҘжҲҲоҶқ
      - name: Run crawl_stockholders
        run: |
          python crawl_stockholders.py

      #Step 2о“Қжҡ—гҒ зҢӮ + о—әоҳҗзҢӯо—®10гӮү
      - name: Run crawl_stockhandle
        run: |
          python crawl_stockhandle.py \
            --dir stockholders \
            --threshold 2.0 \
            --out report_stockholders_weekly_increase.csv

      #о—ҪиӮҡжҢЎзӢҰо“ЈоӮҷо„Өз’¶о“Ө
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-stockholders-report
          path: report_stockholders_weekly_increase.csv

